name: Priere Strasbourg

on:
  schedule:
    - cron: '* * * * *'  # Vérifie chaque minute
  workflow_dispatch:

jobs:
  envoyer-priere:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Installer les dépendances
        run: |
          pip install requests pywhatkit

      - name: Lancer le script
        env:
          NUMEROS: ${{ secrets.NUMEROS_FAMILLE }}
        run: |
          python priere.py
